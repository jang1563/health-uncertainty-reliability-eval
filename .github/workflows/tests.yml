name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest-package-02:
    name: pytest — drug_safety_update_sensitivity_eval
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 02_drug_safety_update_sensitivity_eval

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -r eval/requirements.txt

      - name: Run pytest
        run: pytest tests/ -v
